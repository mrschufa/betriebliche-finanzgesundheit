ten in Milliardenhöhe: durch Krankenstand, sinkende Produktivität und steigende Fluktuation. Betriebliche Finanzgesundheit ist das neue Handlungsfeld, das diese Lücke schließt.`})}),(0,f.jsx)(v,{delay:220,children:(0,f.jsxs)(`div`,{className:`flex flex-wrap gap-3`,children:[(0,f.jsx)(`a`,{href:`#definition`,className:`bg-[#36454f] text-white text-[14px] font-semibold px-5 py-3 rounded-lg hover:bg-[#2a3540] transition-colors`,children:`Konzept verstehen →`}),(0,f.jsx)(`a`,{href:`https://arete-vision.de/kontakt`,target:`_blank`,rel:`noopener`,className:`bg-white text-[#36454f] text-[14px] font-semibold px-5 py-3 rounded-lg border border-[#e8e9eb] hover:border-[#36454f] transition-colors`,children:`Beratung anfragen`})]})})]}),(0,f.jsx)(v,{delay:120,className:`rounded-2xl overflow-hidden shadow-lg`,children:(0,f.jsx)(`img`,{src:`data:image/png;base64,${p}`,alt:`Betriebliche Finanzgesundheit: Die wichtigsten Kennzahlen – 82 Mrd. € Krankenstandkosten, 36% ohne Rücklagen, 1 von 5 mit Leistungseinbußen`,className:`w-full block`})})]})})}),(0,f.jsx)(`section`,{id:`definition`,className:`py-20 md:py-28 px-6`,children:(0,f.jsxs)(`div`,{className:`max-w-7xl mx-auto`,children:[(0,f.jsx)(v,{children:(0,f.jsx)(y,{n:`01`,text:`Definition`})}),(0,f.jsxs)(`div`,{className:`grid lg:grid-cols-2 gap-12 lg:gap-20 items-start`,children:[(0,f.jsxs)(`div`,{children:[(0,f.jsxs)(v,{delay:60,children:[(0,f.jsx)(`h2`,{className:`font-serif text-[clamp(1.9rem,3.5vw,2.8rem)] font-bold text-[#1a2535] leading-tight mb-6`,children:`Was ist Betriebliche Finanzgesundheit?`}),(0,f.jsx)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75] mb-5`,children:`Betriebliche Finanzgesundheit ist ein eigenständiges Handlungsfeld im betrieblichen Gesundheitsmanagement (BGM), das die finanzielle Situation von Mitarbeitenden als betriebliches Thema begreift und strukturiert adressiert. Im Mittelpunkt steht die gezielte Förderung finanzieller Kompetenz, Stabilität und Resilienz von Beschäftigten — nicht als rein privates Problem, sondern als unternehmerische Verantwortung mit messbaren wirtschaftlichen Konsequenzen.`}),(0,f.jsx)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75] mb-5`,children:`Während das klassische BGM körperliche und psychische Gesundheit in den Fokus stellt, schließt Betriebliche Finanzgesundheit eine systematisch übersehene Lücke: die finanzielle Dimension von Wohlbefinden und Leistungsfähigkeit. Finanzielle Sorgen sind eng mit psychischer Belastung, Schlafproblemen, Konzentrationsschwäche und chronischem Stress verknüpft — und haben damit direkte Auswirkungen auf Produktivität, Fehlzeiten und die emotionale Bindung ans Unternehmen.`}),(0,f.jsxs)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75] mb-8`,children:[`Der Begriff wurde von `,(0,f.jsx)(`strong`,{className:`text-[#1a2535]`,children:`Tibor Bauer`}),` geprägt, dem bekanntesten Finanzaufklärer im deutschsprachigen Raum, bekannt als „Mr. Schuldenfrei". Ziel war es, ein gesellschaftlich tabuisiertes Thema aus der Grauzone zu holen und in den strategischen Kontext von Personalführung und BGM zu integrieren. Betriebliche Finanzgesundheit ist kein etablierter Begriff — was zugleich Problem und Chance ist: Unternehmen, die heute handeln, positionieren sich als Pioniere einer neuen Unternehmenskultur.`]})]}),(0,f.jsx)(v,{delay:140,children:(0,f.jsxs)(`div`,{className:`bg-[#36454f] rounded-2xl p-7 relative overflow-hidden`,children:[(0,f.jsx)(`div`,{className:`absolute -top-3 left-4 font-serif text-[8rem] text-white/5 leading-none select-none pointer-events-none`,children:`"`}),(0,f.jsx)(`p`,{className:`text-white/90 leading-relaxed text-[16px] relative z-10 mb-4`,children:`Betriebliche Finanzgesundheit bezeichnet die systematische Stärkung der finanziellen Kompetenz und Resilienz von Mitarbeitenden als Teil des betrieblichen Gesundheitsmanagements — durch Aufklärung, Entstigmatisierung und konkrete, proaktive Unterstützung seitens des Arbeitgebers.`}),(0,f.jsx)(`p`,{className:`text-whi
