mb-5`,children:`Während das klassische BGM körperliche und psychische Gesundheit in den Fokus stellt, schließt Betriebliche Finanzgesundheit eine systematisch übersehene Lücke: die finanzielle Dimension von Wohlbefinden und Leistungsfähigkeit. Finanzielle Sorgen sind eng mit psychischer Belastung, Schlafproblemen, Konzentrationsschwäche und chronischem Stress verknüpft — und haben damit direkte Auswirkungen auf Produktivität, Fehlzeiten und die emotionale Bindung ans Unternehmen.`}),(0,f.jsxs)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75] mb-8`,children:[`Der Begriff wurde von `,(0,f.jsx)(`strong`,{className:`text-[#1a2535]`,children:`Tibor Bauer`}),` geprägt, dem bekanntesten Finanzaufklärer im deutschsprachigen Raum, bekannt als „Mr. Schuldenfrei". Ziel war es, ein gesellschaftlich tabuisiertes Thema aus der Grauzone zu holen und in den strategischen Kontext von Personalführung und BGM zu integrieren. Betriebliche Finanzgesundheit ist kein etablierter Begriff — was zugleich Problem und Chance ist: Unternehmen, die heute handeln, positionieren sich als Pioniere einer neuen Unternehmenskultur.`]})]}),(0,f.jsx)(h,{delay:140,children:(0,f.jsxs)(`div`,{className:`bg-[#36454f] rounded-2xl p-7 relative overflow-hidden`,children:[(0,f.jsx)(`div`,{className:`absolute -top-3 left-4 font-serif text-[8rem] text-white/5 leading-none select-none pointer-events-none`,children:`"`}),(0,f.jsx)(`p`,{className:`text-white/90 leading-relaxed text-[16px] relative z-10 mb-4`,children:`Betriebliche Finanzgesundheit bezeichnet die systematische Stärkung der finanziellen Kompetenz und Resilienz von Mitarbeitenden als Teil des betrieblichen Gesundheitsmanagements — durch Aufklärung, Entstigmatisierung und konkrete, proaktive Unterstützung seitens des Arbeitgebers.`}),(0,f.jsx)(`p`,{className:`text-white/40 text-[12px] uppercase tracking-widest relative z-10`,children:`Tibor Bauer · areté | Coaching & Vision, 2025`})]})})]}),(0,f.jsx)(`div`,{children:(0,f.jsxs)(h,{delay:100,children:[(0,f.jsxs)(`div`,{className:`bg-[#f4f5f7] rounded-2xl p-6 mb-6`,style:{border:`1px solid #e8e9eb`},children:[(0,f.jsx)(`p`,{className:`text-[11px] font-bold uppercase tracking-widest text-[#708090] mb-5`,children:`Abgrenzung zum klassischen BGM`}),(0,f.jsxs)(`div`,{className:`grid grid-cols-3 gap-2 mb-3 pb-2`,style:{borderBottom:`2px solid #e8e9eb`},children:[(0,f.jsx)(`span`,{className:`text-[12px] font-bold text-[#1a2535]`,children:`Aspekt`}),(0,f.jsx)(`span`,{className:`text-[12px] font-bold text-[#708090]`,children:`Klassisches BGM`}),(0,f.jsx)(`span`,{className:`text-[12px] font-bold text-[#36454f]`,children:`Betr. Finanzgesundheit`})]}),[[`Fokus`,`Körper, Psyche, Bewegung`,`Finanzielle Kompetenz & Resilienz`],[`Status`,`Etabliert, standardisiert`,`Neuland — Pionierposition`],[`Förderung`,`Krankenkassengefördert`,`Noch nicht geregelt`],[`Ansatz`,`Oft symptomorientiert`,`Ursachenorientiert, präventiv`],[`Tabu-Ebene`,`Niedrig`,`Hoch — Schulden = Scham`],[`Reichweite`,`Breite Akzeptanz`,`Hoher Nachholbedarf`],[`Nutzen`,`Wohlbefinden, Krankenstand`,`+ Bindung, Loyalität, Umsatz`]].map(([e,t,n],r)=>(0,f.jsxs)(`div`,{className:`grid grid-cols-3 gap-2 py-2.5`,style:{borderBottom:`1px solid #e8e9eb`},children:[(0,f.jsx)(`span`,{className:`text-[13px] font-semibold text-[#1a2535]`,children:e}),(0,f.jsx)(`span`,{className:`text-[13px] text-[#708090]`,children:t}),(0,f.jsx)(`span`,{className:`text-[13px] font-medium text-[#36454f]`,children:n})]},r))]}),(0,f.jsx)(`div`,{className:`space-y-3`,children:[{q:`Ist das wirklich ein BGM-Thema?`,a:`Ja — und ein zentrales. Finanzstress ist nach aktuellen Studien einer der stärksten Treiber psychischer Erkrankungen. Psychische Erkrankungen sind wiederum die häufigste Ursache für Langzeit-Krankschreibungen in Deutschland. Wer BGM ohne die finanzielle Dimension denkt, adressiert Symptome, nicht Ursachen — und löst das Problem nur zur Hälfte. Betriebliche Finanzgesundheit schließt diese Lücke systematisch.`},{q:`Was unterscheidet das von Financial Coaching?`,a:`Der Unterschied ist grundlegend: Financial Coaching richtet sich an Einzelpersonen, die aktiv Hilfe suchen. Betriebliche Finanzgesundheit ist ein strukturelles, betriebliches Angebot, das proaktiv an die gesamte Belegschaft herangetragen wird — unabhängig davon, ob jemand von sich aus Unterstützung anfordert. Das Ziel ist systemische Entstigmatisierung, kultureller Wandel und die Schaffung eines sicheren Rahmens, in dem das Thema im Unternehmen offen besprochen werden kann.`},{q:`Für welche Unternehmensgrößen geeignet?`,a:`Für alle — vom Handwerksbetrieb mit 20 Mitarbeitenden bis zum Konzern. Gerade mittelständische Unternehmen profitieren überproportional, weil dort jeder Ausfall spürbar ist und die persönliche Bindung zwischen Führungskraft und Mitarbeitendem stärker ist. Die Maßnahmen sind vollständig modular: Ein einzelner Vortrag ist genauso möglich wie ein umfassendes Jahresprogramm.`}].map((e,t)=>(0,f.jsxs)(`details`,{className:`bg-white rounded-xl border border-[#e8e9eb] group`,children:[(0,f.jsxs)(`summary`,{className:`px-5 py-4 text-[14px] font-semibold text-[#1a2535] cursor-pointer list-none flex justify-between items-center hover:text-[#36454f] transition-colors`,children:[e.q,(0,f.jsx)(`span`,{className:`text-[#708090] group-open:rotate-180 transition-transform text-lg`,children:`↓`})]}),(0,f.jsx)(`p`,{className:`px-5 pb-4 text-[14px] text-[#708090] leading-relaxed border-t border-[#e8e9eb] pt-3`,children:e.a})]},t))})]})})]})]})}),(0,f.jsx)(`section`,{id:`ursachen`,className:`py-20 md:py-28 px-6 bg-[#f4f5f7]`,style:{borderTop:`1px solid #e8e9eb`,borderBottom:`1px solid #e8e9eb`},children:(0,f.jsxs)(`div`,{className:`max-w-7xl mx-auto`,children:[(0,f.jsx)(h,{children:(0,f.jsx)(v,{n:`02`,text:`Ursachen & Kosten`})}),(0,f.jsxs)(`div`,{className:`grid lg:grid-cols-2 gap-12 lg:gap-20 items-start mb-14`,children:[(0,f.jsx)(`div`,{children:(0,f.jsxs)(h,{delay:60,children:[(0,f.jsx)(`h2`,{className:`font-serif text-[clamp(1.9rem,3.5vw,2.8rem)] font-bold text-[#1a2535] leading-tight mb-6`,children:`Was Finanzstress Unternehmen wirklich kostet`}),(0,f.jsx)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75] mb-5`,children:`Die wirtschaftlichen Folgen von Finanzstress in der Belegschaft sind erheblich — und in weiten Teilen noch nicht ausreichend erfasst. Was messbar ist, zeigt ein klares Bild: Finanzielle Sorgen gehören zu den häufigsten Auslösern psychischer Erkrankungen, die wiederum die größte Einzelursache für Langzeit-Krankschreibungen in Deutschland sind.`}),(0,f.jsxs)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75] mb-5`,children:[`Das Institut der deutschen Wirtschaft (IDW) beziffert die gesamtwirtschaftlichen Kosten durch Krankenstand auf über `,(0,f.jsx)(`a`,{href:`https://www.iwkoeln.de/studien/jochen-pimpertz-entgeltfortzahlung-bei-krankheit-kostet-82-milliarden-euro.html`,target:`_blank`,rel:`noopener`,className:`text-[#36454f] underline hover:no-underline font-medium`,children:`82 Milliarden Euro jährlich`}),`. Ein erheblicher Anteil davon ist direkt oder indirekt auf finanzielle Überlastung zurückzuführen. Dazu kommen die kaum messbaren, aber real existierenden Kosten durch innere Kündigung, erhöhte Fehlerquoten und verschlechtertes Betriebsklima.`]}),(0,f.jsxs)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75] mb-5`,children:[`Laut dem `,(0,f.jsx)(`a`,{href:`https://www.creditreform.de/aktuelles-wissen/schuldneratlas`,target:`_blank`,rel:`noopener`,className:`text-[#36454f] underline hover:no-underline font-medium`,children:`SchuldnerAtlas Deutschland 2025 von Creditreform`}),` gelten 5,67 Millionen Menschen in Deutschland als überschuldet — das entspricht einer Überschuldungsquote von 8,16 %. Erstmals seit 2018 nimmt die Zahl überschuldeter Verbraucher wieder merklich zu. Die `,(0,f.jsx)(`a`,{href:`https://www.crif.de/pr-events/pressemeldungen/pressemeldung-75-prozent-der-deutschen-erwarten-finanzielle-herausforderungen/`,target:`_blank`,rel:`noopener`,className:`text-[#36454f] underline hover:no-underline font-medium`,children:`CRIF-Studie 2024`}),` zeigt: 78 % der deutschen Verbraucher berichten Bedenken hinsichtlich ihrer finanziellen Lage. Das sind keine Randgruppen-Phänomene — das ist der Querschnitt einer durchschnittlichen deutschen Belegschaft.`]}),(0,f.jsx)(`p`,{className:`text-[#708090] text-[16px] leading-[1.75]`,children:`Häufigste Auslöser finanzieller Not sind: Trennung oder Scheidung, Phasen der Arbeitslosigkeit oder Kurzarbeit, schwere Erkrankungen in der Familie sowie — unterschätzt — mangelnde Finanzbildung. Das deutsche Schulsystem vermittelt keine Grundkenntnisse zu Schufa, Bonität oder Schuldenmanagement. Die Folge: Viele Beschäftigte stehen beim ersten Einbruch ohne Orientierung und ohne Handlungskompetenz da.`})]})}),(0,f.jsx)(h,{delay:100,children:(0,f.jsx)(_,{src:`data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABLAAAANcCAIAAADAYsHvAAEAAElEQVR4nOzddXwT5x8H8CdJ3d3dvaXFSoEWd9fh7gwYzPeDMWdsw8Y2NoYz3G24FYfSUqHUFai7pWnz++NYOJI2TdO0SXqf96t/JM/dPfd9Ls9d75vn7sLq3G8EAQAAAAAAAOZhyzsAAAAAAAAAkA8khAAAAAAAAAyFhBAAAAAAAIChkBACAAAAAAAwFBJCAAAAAAAAhkJCCAAAAAAAwFBICAEAAAAAABgKCSEAAAAAAABDISEEAAAAAABgKCSEAAAAAAAADMXi8/nyjgEAAAAAAADkACOEAAAAAAAADIWEEAAAAAAAgKGQEAIAAAAAADAUEkIAAAAAAACGQkIIAAAAAADAUEgIAQAAAAAAGAoJIQAAAAAAAEMhIQQAAAAAAGAoJIQAAAAAAAAMhYQQAAAAAACAoZAQAgAAAAAAMBQSQgAAAAAAAIZCQggAAAAAAMBQSAgBAAAAAAAYCgkhAAAAAAAAQyEhBAAAAAAAYCgkhAAAAAAAAAyFhBAAAAAAAIChkBACAAAAAAAwFBJCAAAAAAAAhkJCCAAAAAAAwFBICAEAAAAAABgKCSEAAAAAAABDISEEAAAAAABgKCSEAAAAAAAADKUi7wAatWLtJvpbDXV1G0vTkE5+AV6u9BncHG0XThvd4CICG9Yso7/dfuBMbEIKIWTF3Il2VuaEkCfR8fuOXySETBjWp2ugDyEkN7/o+617CCGBPu5TxwwUWpfQijhstpmJYSd/r9DgDmwWSzS2yuqajdsP5RUUaairLZ05zsrcRMIZGmtLY1MF84ifQcyCUiwFAAAAAABKSnETQgqHzdbS1Kirq6usrklKy0pKy0rr2mHkgJ5NLiJmBh8PJyohTMt8RSWEyenZ1KTk9GwqIUzNfEmV+Ho4i18Rn5DKqupXuQWnL98uKSsXja2uvn7X4XN5BUUcNnvm+CFW5iaSz9BYW3S1tagXlVXVdfX19BJJZiirqBRTOQAAAAAAMISiJ4TO9tbUGFp+YfGuI+ezX+fdvP/U38vV0dayyUUa4+3qyCKET0ha5queXQIIIakZr1gsFqFlhulZrwkhHDbb0
